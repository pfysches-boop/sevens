<!DOCTYPE html>
<head>
  <title>Sevens</title>
  <link rel="icon" type="image/x-icon" href="icon.png">
  <link rel="stylesheet" type="text/css" href="style.css">
</head>
<body>
  <div class="center">
    <div class="menubar"> 
      <a id="start-game-menuitem">Start New Round</a>
      <a id="view-scoreboard-menuitem">View Scoreboard</a>
      <a id="edit-rules-menuitem">Edit Game Rules</a>
      <a id="edit-profile-menuitem">Edit Profile</a>
    </div>
    <div id="opponent-hand-div">
      <div class="overlay" id="opponent-hand-overlay" style="visibility: hidden;"></div>
    </div>
    <div id="table-div">
      <div class="overlay" id="table-overlay" style="visibility: hidden;"></div>
      <table id="table-table">
        <tr>
          <td id="♠-high-cell"></td>
          <td class="spacer-cell"></td>
          <td id="♦-high-cell"></td>
          <td class="spacer-cell"></td>
          <td id="♣-high-cell"></td>
          <td class="spacer-cell"></td>
          <td id="♥-high-cell"></td>
        </tr>
        <tr>
          <td id="♠-low-cell"></td>
          <td class="spacer-cell"></td>
          <td id="♦-low-cell"></td>
          <td class="spacer-cell"></td>
          <td id="♣-low-cell"></td>
          <td class="spacer-cell"></td>
          <td id="♥-low-cell"></td>
        </tr>
      </table>
    </div>

    <div class="menubar">
      <a id="sort-by-rank-menuitem">Sort by Rank</a>
      <a id="sort-by-suit-menuitem">Sort by Suit</a>
      <a id="request-card-menuitem" class="special" style="visibility: hidden;">Ask for Card</a>
    </div>
    <div id="client-hand-div">
      <div class="overlay" id="client-hand-overlay" style="visibility:hidden;"></div>
    </div>

  </div>

  <script>let exports = {}</script>
  <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
  <script src="js/card.js"></script>
  <script src="js/gamestate.js"></script>
  <script src="js/main.js"></script>
</body>
